# Local dev stack: full platform on one laptop.
services:
  app:
    build: ./app
    ports: ["8000:8000"]
    environment:
      MYSQL_HOST: mysql
      MYSQL_PASSWORD: test
      REDIS_URL: redis://redis:6379/0
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_started }

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: test
      MYSQL_DATABASE: cards
    volumes:
      - ./app/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-ptest"]
      interval: 5s
      retries: 10

  redis:
    image: redis:7-alpine

  prometheus:
    image: prom/prometheus:v2.53.0
    volumes:
      - ./observability/prometheus:/etc/prometheus:ro
    ports: ["9090:9090"]

  alertmanager:
    image: prom/alertmanager:v0.27.0
    volumes:
      - ./observability/alertmanager:/etc/alertmanager:ro
    ports: ["9093:9093"]

  loki:
    image: grafana/loki:3.1.0
    command: -config.file=/etc/loki/loki.yml
    volumes:
      - ./observability/loki:/etc/loki:ro
    ports: ["3100:3100"]

  promtail:
    image: grafana/promtail:3.1.0
    command: -config.file=/etc/promtail/promtail.yml
    volumes:
      - ./observability/promtail:/etc/promtail:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro

  grafana:
    image: grafana/grafana:11.1.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./observability/grafana:/etc/grafana/provisioning:ro
    ports: ["3000:3000"]
